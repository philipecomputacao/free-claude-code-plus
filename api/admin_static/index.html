<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Free Claude Code Admin</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/admin/assets/admin.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">FC</div>
          <div>
            <h1>Free Claude Code</h1>
            <p>Server Control</p>
          </div>
        </div>
        <nav id="sectionNav" class="section-nav" aria-label="Admin views"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="pageTitle">Providers</h2>
          </div>
        </header>

        <div id="adminViews" class="admin-views">
          <section id="view-providers" class="admin-view active" data-view="providers">
            <section class="provider-strip" aria-label="Provider status">
              <div class="strip-header">
                <h3>Providers</h3>
              </div>
              <div id="providerGrid" class="provider-grid"></div>
            </section>
            <div
              id="providersSections"
              class="form-sections"
              aria-label="Provider configuration"
            ></div>
          </section>

          <section id="view-model_config" class="admin-view" data-view="model_config" hidden>
            <section class="visible-models-panel" aria-label="Visible models">
              <div class="visible-models-header">
                <div>
                  <h3>Modelos visíveis</h3>
                  <p class="visible-models-subtitle">
                    Todos os modelos aparecem por padrão. Desmarque os que
                    não quer ver no <code>/model</code> do Claude Code.
                  </p>
                </div>
                <div class="visible-models-actions">
                  <input
                    type="search"
                    id="visibleModelsSearch"
                    placeholder="Buscar provider ou modelo"
                    autocomplete="off"
                  />
                  <button id="visibleModelsRefresh" class="secondary-button" type="button" title="Busca modelos novos em todos os providers configurados">
                    Atualizar lista
                  </button>
                  <button id="visibleModelsCheckAll" class="secondary-button" type="button">
                    Marcar todos
                  </button>
                  <button id="visibleModelsClearAll" class="secondary-button" type="button">
                    Desmarcar todos
                  </button>
                </div>
              </div>
              <div id="visibleModelsList" class="visible-models-list"></div>
              <p id="visibleModelsEmpty" class="visible-models-empty" hidden>
                Nenhum modelo descoberto ainda. Clique em "Atualizar lista"
                acima (ou use "Refresh models" nos cards de provider).
              </p>
            </section>
            <div
              id="modelConfigSections"
              class="form-sections"
              aria-label="Model configuration"
            ></div>
          </section>

          <section id="view-messaging" class="admin-view" data-view="messaging" hidden>
            <div
              id="messagingSections"
              class="form-sections"
              aria-label="Messaging configuration"
            ></div>
          </section>
        </div>
      </main>

      <footer class="action-bar">
        <div class="action-meta">
          <strong id="dirtyState">No changes</strong>
          <span id="configPath"></span>
        </div>
        <div id="messageArea" class="message-area"></div>
        <div class="action-buttons">
          <button id="validateButton" class="secondary-button" type="button">Validate</button>
          <button id="applyButton" class="primary-button" type="button" disabled>Apply</button>
        </div>
      </footer>
    </div>
    <script src="/admin/assets/admin.js"></script>
  </body>
</html>
