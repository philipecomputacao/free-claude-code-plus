name: Upstream sync check

on:
  schedule:
    # Every Monday 09:00 BRT (UTC-3) = 12:00 UTC.
    # Cheap (~10s runtime); only opens an issue when divergence is detected.
    - cron: '0 12 * * 1'
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  issues: write

jobs:
  upstream-divergence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # actions/checkout does not include remote URLs by default — pull
          # the upstream ref we need from a full clone so we can read its
          # commit graph without touching origin/main.

      - name: Add upstream + fetch
        run: |
          git remote add upstream https://github.com/Alishahryar1/free-claude-code.git
          git fetch upstream --no-tags main

      - name: Compute divergence
        id: check
        run: |
          UPSTREAM_TIP="$(git rev-parse upstream/main)"
          LOCAL_TIP="$(git rev-parse HEAD)"
          BEHIND="$(git rev-list --count "${LOCAL_TIP}..${UPSTREAM_TIP}")"
          {
            echo "upstream=${UPSTREAM_TIP}"
            echo "local=${LOCAL_TIP}"
            echo "behind=${BEHIND}"
            if [ "${BEHIND}" -gt 0 ]; then
              echo "diverged=true"
              echo "::warning::Upstream is ${BEHIND} commit(s) ahead of our main."
            else
              echo "diverged=false"
              echo "Up to date with upstream."
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Build run summary
        if: always()
        env:
          BEHIND: ${{ steps.check.outputs.behind }}
          LOCAL: ${{ steps.check.outputs.local }}
          UPSTREAM: ${{ steps.check.outputs.upstream }}
        run: |
          {
            echo "## Upstream sync check"
            echo
            echo "- **Local main:** \`${LOCAL}\`"
            echo "- **Upstream main:** \`${UPSTREAM}\`"
            echo "- **Behind by:** ${BEHIND} commit(s)"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${BEHIND}" -gt 0 ]; then
            {
              echo
              echo "### Upstream commits not in our main"
              echo
              echo '```'
              git log --oneline "HEAD..upstream/main" | head -20
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open / update issue when diverged
        if: steps.check.outputs.diverged == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const behind = '${{ steps.check.outputs.behind }}';
            const repo = context.repo;
            const label = 'upstream-sync';

            const upstreamLog = require('child_process')
              .execSync('git log --oneline HEAD..upstream/main | head -10', { cwd: process.cwd() })
              .toString()
              .trim();

            const syncInstructions = [
              '```bash',
              'cd ~/free-claude-code-plus',
              'git fetch upstream',
              'git checkout main && git merge upstream/main',
              'git checkout feat/provider-minimax && git rebase main',
              '# resolve conflicts if any (common: api/admin_config.py, config/provider_catalog.py)',
              'uv tool install --reinstall .',
              'pkill -f fcc-server; sleep 2; nohup fcc-server > ~/.fcc/server.log 2>&1 &',
              '```',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: repo.owner,
              repo: repo.repo,
              state: 'open',
              labels: label,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              core.info(`Reusing existing issue #${issue.number}`);
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issue.number,
                body: [
                  `🔄 Upstream divergence re-checked — still **${behind}** commit(s) behind.`,
                  ``,
                  `Last check: ${new Date().toISOString()}`,
                  ``,
                  syncInstructions,
                ].join('\n'),
              });
              return;
            }

            await github.rest.issues.create({
              owner: repo.owner,
              repo: repo.repo,
              title: `🔄 Upstream Alishahryar1/free-claude-code is ${behind} commit(s) ahead`,
              body: [
                `Upstream \`Alishahryar1/free-claude-code\` has new commits not in our \`main\`.`,
                ``,
                `**Behind by:** ${behind} commit(s)`,
                ``,
                `### Latest upstream commits`,
                ``,
                '```',
                upstreamLog,
                '```',
                ``,
                `### To sync locally`,
                ``,
                syncInstructions,
                ``,
                `See \`FORK_NOTES.md\` for full sync instructions.`,
              ].join('\n'),
              labels: [label, 'maintenance'],
            });
